/* 底栏 Safari 式收放:下滑收缩成迷你条,上滑/停住/到顶到底弹回 */
(function(){
  const bar = document.getElementById("savebarRec");
  if(!bar) return;
  let lastY = window.scrollY, acc = 0, idleT = null, ticking = false;
  function onScroll(){
    ticking = false;
    const y = window.scrollY;
    const dy = y - lastY; lastY = y;
    const maxY = document.documentElement.scrollHeight - innerHeight;
    if(y < 60 || y > maxY - 40){ bar.classList.remove("mini"); acc = 0; }
    else{
      acc = (dy > 0) === (acc > 0) ? acc + dy : dy;   /* 换向清零累计 */
      if(acc > 26) bar.classList.add("mini");
      else if(acc < -26) bar.classList.remove("mini");
    }
    clearTimeout(idleT);
    idleT = setTimeout(()=>bar.classList.remove("mini"), 900); /* 停住即弹回 */
  }
  window.addEventListener("scroll", ()=>{
    if(!ticking){ ticking = true; requestAnimationFrame(onScroll); }
  }, {passive:true});
})();

/* ================================================================
   阶段2:节奏播放引擎(Web Audio)
   - AudioContext 仅在用户点击时创建/解锁(iOS 约束)
   - lookahead 调度:setInterval 25ms 预排 120ms,音频与画面分离
   - 拨弦格(值1)合成 pluck 音;节拍器点每拍,小节首拍重音
   - 慢练 60%-100% 变速,chip 选中态用 Royal;不改动乐句数据
   ================================================================ */
const SPEEDS = [60,65,70,75,80,85,90,95,100];
let audioCtx = null;
let _noiseBuf = null;
const player = {
  playing:false, metOn:false, speed:100,
  nextTime:0, timer:null, rafId:null,
  queue:[], cells:[],
  events:[], idx:0        /* 事件流：每格 {durBeats,val,beatStart,downbeat,domIndex} */
};

function ensureCtx(){
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return null;
  if(audioCtx && audioCtx.state === "closed"){ audioCtx = null; _noiseBuf = null; }
  if(!audioCtx){ audioCtx = new AC(); _noiseBuf = null; }
  if(audioCtx.state !== "running"){ try{ audioCtx.resume(); }catch(e){} }
  return audioCtx;
}
/* iOS:alphaTab 播放器起自己的 AudioContext 后,本页的会被打断(interrupted/suspended
   且 resume 可能无效)→ 表现为渲染过谱面后,节奏区播放/节拍器没声。
   修法:在用户手势里先试 resume,250ms 内救不活就关掉重建一个新的。 */
function reviveCtx(){
  return new Promise(res=>{
    const c = ensureCtx();
    if(!c){ res(null); return; }
    if(c.state === "running"){ res(c); return; }
    let done = false;
    const finish = ()=>{
      if(done) return; done = true;
      if(audioCtx && audioCtx.state === "running"){ res(audioCtx); return; }
      try{ if(audioCtx) audioCtx.close(); }catch(e){}
      audioCtx = null; _noiseBuf = null;
      res(ensureCtx());
    };
    try{ Promise.resolve(c.resume()).then(finish, finish); }catch(e){ finish(); }
    setTimeout(finish, 250);
  });
}
/* 全停:换页/离开页面用;平时两个播放器只在「按下播放」那一刻互斥 */
function stopAllAudio(){
  stopPlay();
  if(typeof at3Stop === "function") at3Stop();
}
function baseBpm(){ return S.bpm!==null ? S.bpm : 80; }
function effBpm(){ return Math.max(20, Math.round(baseBpm() * player.speed / 100)); }
function beatSec(){ return 60 / effBpm(); }   /* 一个主拍的秒长 */
/* 由 S.bars 构建事件流：每格记录时长(以拍为单位)、拨弦值、是否拍首/强拍、DOM 序号 */
function buildEvents(){
  const evs = []; let dom = 0;
  S.bars.forEach((bar,bi)=>{
    (bar||[]).forEach((beat,bei)=>{
      const cells = beat.cells || [];
      const sub = Math.max(1, cells.length);
      cells.forEach((v,ci)=>{
        evs.push({
          durBeats: 1/sub, val: v,
          beatStart: ci===0,
          downbeat: (bei===0 && ci===0),
          domIndex: dom
        });
        dom++;
      });
    });
  });
  return evs;
}

/* -------- 合成音色 -------- */
function pickNoise(){
  if(_noiseBuf) return _noiseBuf;
  const len = Math.floor(audioCtx.sampleRate * 0.05);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<len;i++){ d[i] = (Math.random()*2-1) * (1 - i/len); }
  _noiseBuf = buf; return buf;
}
function pluck(time){
  const ctx = audioCtx, master = ctx.createGain();
  master.gain.setValueAtTime(0.0001, time);
  master.gain.exponentialRampToValueAtTime(0.5, time+0.006);
  master.gain.exponentialRampToValueAtTime(0.0001, time+0.24);
  master.connect(ctx.destination);
  const lp = ctx.createBiquadFilter();
  lp.type = "lowpass";
  lp.frequency.setValueAtTime(2600, time);
  lp.frequency.exponentialRampToValueAtTime(520, time+0.2);
  lp.connect(master);
  const o1 = ctx.createOscillator(); o1.type="sawtooth"; o1.frequency.value=196;
  const o2 = ctx.createOscillator(); o2.type="sawtooth"; o2.frequency.value=294;
  o1.connect(lp); o2.connect(lp);
  const nb = ctx.createBufferSource(); nb.buffer = pickNoise();
  const hp = ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=1300;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.28, time);
  ng.gain.exponentialRampToValueAtTime(0.0001, time+0.03);
  nb.connect(hp); hp.connect(ng); ng.connect(master);
  o1.start(time); o2.start(time); nb.start(time);
  o1.stop(time+0.26); o2.stop(time+0.26); nb.stop(time+0.06);
}
function click(time, accent){
  const ctx = audioCtx;
  const o = ctx.createOscillator(); o.type="triangle";
  o.frequency.value = accent ? 1650 : 1050;
  const g = ctx.createGain();
  const peak = accent ? 0.5 : 0.3;
  g.gain.setValueAtTime(0.0001, time);
  g.gain.exponentialRampToValueAtTime(peak, time+0.002);
  g.gain.exponentialRampToValueAtTime(0.0001, time+0.045);
  o.connect(g); g.connect(ctx.destination);
  o.start(time); o.stop(time+0.06);
}

/* -------- 调度 -------- */
function scheduler(){
  if(!audioCtx || !player.events.length) return;
  const ahead = 0.12;
  while(player.nextTime < audioCtx.currentTime + ahead){
    const ev = player.events[player.idx];
    if(ev.val === 1) pluck(player.nextTime);
    if(player.metOn && ev.beatStart) click(player.nextTime, ev.downbeat);
    player.queue.push({ domIndex: ev.domIndex, time: player.nextTime });
    player.nextTime += ev.durBeats * beatSec();
    player.idx = (player.idx + 1) % player.events.length;
  }
}
function drawLoop(){
  if(!player.playing || !audioCtx) return;
  const now = audioCtx.currentTime;
  let dom = -1;
  while(player.queue.length && player.queue[0].time <= now){ dom = player.queue.shift().domIndex; }
  if(dom >= 0){
    player.cells.forEach(c=>c.classList.remove("playing"));
    const c = player.cells[dom]; if(c) c.classList.add("playing");
  }
  player.rafId = requestAnimationFrame(drawLoop);
}

/* -------- 播放控制 -------- */
async function startPlay(){
  if(typeof at3Stop === "function") at3Stop();   /* 播放瞬间互斥:停谱面 */
  const ctx = await reviveCtx();
  if(!ctx){ toast("此浏览器不支持音频播放"); return; }
  player.events = buildEvents();
  if(!player.events.length){ toast("先在节奏格里点几个音"); return; }
  player.cells = Array.from(document.querySelectorAll("#barsBox .cell"));
  player.idx = 0;
  player.queue = [];
  player.nextTime = audioCtx.currentTime + 0.08;
  player.playing = true;
  setPlayUI(true);
  scheduler();
  player.timer = setInterval(scheduler, 25);
  player.rafId = requestAnimationFrame(drawLoop);
}
function stopPlay(){
  if(!player.playing){
    document.querySelectorAll("#barsBox .cell.playing").forEach(c=>c.classList.remove("playing"));
    return;
  }
  player.playing = false;
  if(player.timer){ clearInterval(player.timer); player.timer=null; }
  if(player.rafId){ cancelAnimationFrame(player.rafId); player.rafId=null; }
  player.queue = [];
  (player.cells||[]).forEach(c=>c.classList.remove("playing"));
  document.querySelectorAll("#barsBox .cell.playing").forEach(c=>c.classList.remove("playing"));
  setPlayUI(false);
}
function togglePlay(){ player.playing ? stopPlay() : startPlay(); }
function toggleMet(){
  player.metOn = !player.metOn;
  document.getElementById("metBtn").classList.toggle("on", player.metOn);
  ensureCtx();
}
function setPlayUI(on){
  document.getElementById("playIcon").textContent = on ? "■" : "▶";
  document.getElementById("playLabel").textContent = on ? "停止" : "播放";
  document.getElementById("playBtn").classList.toggle("on", on);
}
function updateTpBpm(){
  const el = document.getElementById("tpBpm"); if(!el) return;
  const b = effBpm();
  el.textContent = S.bpm===null ? `♩ ${b} · 未设速度` : `♩ ${b}`;
}
function drawTransport(){
  const box = document.getElementById("speedBox");
  if(box) box.textContent = player.speed + "%";
  const met = document.getElementById("metBtn");
  if(met) met.classList.toggle("on", player.metOn);
  setPlayUI(player.playing);
  updateTpBpm();
}
function openSpeedPicker(){
  openWheel("慢练速度", SPEEDS.map(p=>({value:p,label:p+"%"})), player.speed, p=>{
    player.speed = p; drawTransport(); updateTpBpm();
  });
}

/* ================================================================
   阶段3B:点指板拼谱 → 生成 alphaTex → 渲染 / 试奏
   - 指板选择器:6 弦 × 0-12 品,点格入音;时值 chip(2/4/8/16),默认 8;
     序列里的音可点击循环改时值。休止符独立按钮。
   - 导入骨架:把「骨架」区的音名(八度 4)追加到序列,一键试听。
   - 慢练 60-100%(真播放器用 playbackSpeed;降级合成按 tempo 折算)。
   - A-B 循环:真播放器用 isLooping;降级合成到尾自动重排。
   - 底层仍是自托管 alphaTab:懒加载、tab 谱、配色跟随主题;
     soundFont 未就绪/失败 → 降级合成拨弦音(按 realValue 调度)。
   - 与阶段2节奏循环互斥。
   ================================================================ */
const AT_TUNING = [64,59,55,50,45,40];         /* 弦1..6 空弦 midi(高E→低E) */
const PC_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const AT_FRETS = 20;                            /* 指板品数 */
const AT_MARKERS = [3,5,7,9,15,17,19];          /* 单点品位标记 */
const AT_MARKERS2 = [12];                        /* 双点品位标记 */
/* 细分数 → alphaTex 音值 + 连音标记 */
const DUR_FOR_SUB = { 1:{v:4}, 2:{v:8}, 3:{v:8,tu:3}, 4:{v:16}, 6:{v:16,tu:6}, 8:{v:32} };
/* 序列项:{s,f} 品位音 | {s,f,as} 骨架音(带音名) */
let atNotes = [];
let atSel = -1;         /* 音序里选中的下标,-1 = 未选中 */
let atInsert = false;   /* 插入模式:点指板插到选中音之后 */
const AT_MAX = 64;
let tapMute = (function(){ try{ return localStorage.getItem("gl-tapmute")==="1"; }catch(e){ return false; } })();
const at3 = { api:null, rendered:false, sfOk:false, playing:false, fb:null, fbTimer:null,
              speed:100, loop:false, met:false };

/* -------- 指板选择器 -------- */
function noteName(s,f){ return PC_NAMES[(AT_TUNING[s-1]+f)%12]; }
function midiOf(s,f){ return AT_TUNING[s-1] + f; }
function freqOf(midi){ return 440 * Math.pow(2, (midi-69)/12); }
function previewPitch(s,f){
  if(tapMute) return;
  reviveCtx().then(ctx=>{
    if(!ctx) return;
    const master = ctx.createGain(); master.gain.value = 0.9;
    master.connect(ctx.destination);
    pluckNote(master, ctx.currentTime + 0.01, freqOf(midiOf(s,f)), 0.6);
    setTimeout(()=>{ try{ master.disconnect(); }catch(e){} }, 900);
  });
}
function buildFretGrid(){
  const grid = document.getElementById("fretGrid");
  if(!grid) return;
  grid.style.gridTemplateColumns = "44px repeat(" + (AT_FRETS+1) + ", 44px)";
  grid.innerHTML = "";
  const corner = document.createElement("div"); corner.className="fret-hd"; grid.appendChild(corner);
  for(let f=0; f<=AT_FRETS; f++){
    const h = document.createElement("div"); h.className="fret-hd"; h.textContent=f; grid.appendChild(h);
  }
  for(let s=1; s<=6; s++){
    const lab = document.createElement("div"); lab.className="fret-slab";
    lab.textContent = s + "弦 " + PC_NAMES[AT_TUNING[s-1]%12];
    grid.appendChild(lab);
    for(let f=0; f<=AT_FRETS; f++){
      const c = document.createElement("div");
      let cls = "fret-cell" + (f===0 ? " open" : "");
      if(s===1){ if(AT_MARKERS.indexOf(f)>=0) cls += " marker"; if(AT_MARKERS2.indexOf(f)>=0) cls += " marker2"; }
      c.className = cls;
      c.textContent = noteName(s,f);
      c.onclick = ()=>{ if(dragSwallowClick()) return; fretTap(s, f, c); };
      c.addEventListener("pointerdown", e=>dragArm(e, "new", {s, f}));
      grid.appendChild(c);
    }
  }
}
function flashCell(c){ c.classList.add("picked"); setTimeout(()=>c.classList.remove("picked"), 180); }
function toggleTapMute(){
  tapMute = !tapMute;
  try{ localStorage.setItem("gl-tapmute", tapMute?"1":"0"); }catch(e){}
  const b = document.getElementById("tapMuteBtn");
  if(b){ b.textContent = tapMute ? "🔇 点音静音" : "🔊 点音有声"; b.classList.toggle("on", tapMute); }
}
function noteLabel(it){
  if(it.as) return it.as + "·" + it.s + "弦" + it.f + "品";
  return noteName(it.s,it.f) + "·" + it.s + "弦" + it.f + "品";
}
/* 点指板:未选中=追加;选中=替换;选中+插入模式=插到其后(并顺移选中,可连续插) */
function fretTap(s, f, cellEl){
  if(atSel>=0 && atSel<atNotes.length){
    if(atInsert){
      if(atNotes.length>=AT_MAX){ toast("音序最多 "+AT_MAX+" 个音"); return; }
      atNotes.splice(atSel+1, 0, {s, f});
      atSel = atSel+1;
    }else{
      atNotes[atSel] = { s, f };
    }
  }else{
    if(atNotes.length>=AT_MAX){ toast("音序最多 "+AT_MAX+" 个音"); return; }
    atNotes.push({s, f});
  }
  noteSeqChanged();
  if(cellEl) flashCell(cellEl);
  previewPitch(s, f);
}
/* 音序任何改动统一走这里:夹住选中下标 + 重绘 + 自动入库 */
function noteSeqChanged(){
  if(atSel >= atNotes.length){ atSel = -1; atInsert = false; }
  drawNoteSeq();
  markDirty();
}
function drawNoteSeq(){
  const box = document.getElementById("noteSeq"); if(!box) return;
  box.innerHTML = "";
  atNotes.forEach((it, i)=>{
    const p = document.createElement("span");
    p.className = "note-pill" + (i===atSel ? " sel" : "");
    p.dataset.i = i;
    p.innerHTML = "<span class='n'>" + (i+1) + "</span><span>" + noteLabel(it) + "</span>";
    p.title = "点击选中 · 长按拖动排序";
    p.onclick = ()=>{
      if(dragSwallowClick()) return;
      if(atSel===i){ atSel = -1; atInsert = false; }
      else { atSel = i; atInsert = false; }
      drawNoteSeq();
    };
    p.addEventListener("pointerdown", e=>dragArm(e, "move", i));
    box.appendChild(p);
  });
  drawNoteEditBar();
  updateAtLink();
}
function drawNoteEditBar(){
  const bar = document.getElementById("noteEditBar"); if(!bar) return;
  const on = atSel>=0 && atSel<atNotes.length;
  bar.hidden = !on;
  if(on){
    const hint = document.getElementById("noteEditHint");
    if(hint) hint.textContent = "已选中第 " + (atSel+1) + " 音(" + noteLabel(atNotes[atSel]) + ") · "
      + (atInsert ? "插入模式:点指板会插到它后面" : "点指板 = 替换这个音");
    const ins = document.getElementById("selInsBtn");
    if(ins) ins.classList.toggle("on", atInsert);
  }
}

/* -------- 长按拖动:音序内排序(move) / 指板拖入(new) --------
   iPhone Safari:长按 280ms 触发;触发后用非被动 touchmove 挡掉页面滚动。
   快点 = 原有点击;长按前一动(>10px) = 当作滚动,取消拖拽。 */
const atDrag = { armed:false, active:false, kind:null, data:null,
                 x0:0, y0:0, pid:null, timer:null, ghost:null,
                 overIdx:-1, swallow:false };
function dragSwallowClick(){
  if(atDrag.swallow){ atDrag.swallow = false; return true; }
  return false;
}
function _blockScroll(e){ e.preventDefault(); }
function dragArm(e, kind, data){
  if(e.pointerType==="mouse" && e.button!==0) return;
  dragCleanup();
  atDrag.armed = true; atDrag.kind = kind; atDrag.data = data;
  atDrag.x0 = e.clientX; atDrag.y0 = e.clientY; atDrag.pid = e.pointerId;
  atDrag.timer = setTimeout(dragStart, 280);
  document.addEventListener("pointermove", dragMove, {passive:false});
  document.addEventListener("pointerup", dragEnd);
  document.addEventListener("pointercancel", dragCancel);
}
function dragStart(){
  if(!atDrag.armed) return;
  atDrag.armed = false; atDrag.active = true; atDrag.swallow = true;
  document.addEventListener("touchmove", _blockScroll, {passive:false});
  const g = document.createElement("div");
  g.className = "drag-ghost";
  if(atDrag.kind==="move"){
    const it = atNotes[atDrag.data];
    g.textContent = it ? noteLabel(it) : "";
    const pill = document.querySelector('#noteSeq .note-pill[data-i="'+atDrag.data+'"]');
    if(pill) pill.classList.add("dragging");
  }else{
    g.textContent = noteName(atDrag.data.s, atDrag.data.f) + "·" + atDrag.data.s + "弦" + atDrag.data.f + "品";
  }
  document.body.appendChild(g);
  atDrag.ghost = g;
  moveGhost(atDrag.x0, atDrag.y0);
  atDrag.overIdx = dropIndexAt(atDrag.x0, atDrag.y0);
  paintDropMark();
}
function moveGhost(x,y){
  if(atDrag.ghost){ atDrag.ghost.style.left = x+"px"; atDrag.ghost.style.top = y+"px"; }
}
function dragMove(e){
  if(e.pointerId!==atDrag.pid) return;
  if(atDrag.armed){
    if(Math.abs(e.clientX-atDrag.x0)>10 || Math.abs(e.clientY-atDrag.y0)>10) dragCancel(e);
    return;
  }
  if(!atDrag.active) return;
  e.preventDefault();
  moveGhost(e.clientX, e.clientY);
  atDrag.overIdx = dropIndexAt(e.clientX, e.clientY);
  paintDropMark();
}
/* 指针位置 → 音序插入下标;不在音序框附近返回 -1 */
function dropIndexAt(x,y){
  const box = document.getElementById("noteSeq"); if(!box) return -1;
  const r = box.getBoundingClientRect(), pad = 30;
  if(x < r.left-pad || x > r.right+pad || y < r.top-pad || y > r.bottom+pad) return -1;
  const pills = box.querySelectorAll(".note-pill");
  for(let i=0;i<pills.length;i++){
    const pr = pills[i].getBoundingClientRect();
    if(y < pr.top-6 || y > pr.bottom+6) continue;   /* 只按同一行判定 */
    if(x < pr.left + pr.width/2) return i;
  }
  let idx = pills.length;
  for(let i=0;i<pills.length;i++){
    const pr = pills[i].getBoundingClientRect();
    if(y < pr.top-6){ idx = i; break; }             /* 在这行上方 → 插到该行行首 */
  }
  return idx;
}
function paintDropMark(){
  const box = document.getElementById("noteSeq"); if(!box) return;
  const pills = box.querySelectorAll(".note-pill");
  pills.forEach(p=>p.classList.remove("ins-before","ins-after"));
  box.classList.remove("drop-end");
  const k = atDrag.overIdx;
  if(k<0) return;
  if(!pills.length){ box.classList.add("drop-end"); return; }
  if(k>=pills.length) pills[pills.length-1].classList.add("ins-after");
  else pills[k].classList.add("ins-before");
}
function dragEnd(e){
  if(e.pointerId!==atDrag.pid) return;
  const wasActive = atDrag.active;
  const to = atDrag.overIdx, kind = atDrag.kind, data = atDrag.data;
  dragCleanup();
  if(!wasActive) return;                 /* 没长按满 = 普通点击 */
  if(to < 0){ drawNoteSeq(); return; }   /* 拖到框外 = 取消 */
  if(kind==="move"){
    const from = data;
    let t = to;
    if(from<0 || from>=atNotes.length || t===from || t===from+1){ drawNoteSeq(); return; }
    const it = atNotes.splice(from,1)[0];
    if(t>from) t--;
    atNotes.splice(t,0,it);
    atSel = -1; atInsert = false;
    noteSeqChanged();
  }else{
    if(atNotes.length>=AT_MAX){ toast("音序最多 "+AT_MAX+" 个音"); drawNoteSeq(); return; }
    atNotes.splice(to, 0, {s:data.s, f:data.f});
    atSel = -1; atInsert = false;
    noteSeqChanged();
    previewPitch(data.s, data.f);
  }
}
function dragCancel(e){
  if(e && e.pointerId!==atDrag.pid) return;
  const wasActive = atDrag.active;
  dragCleanup();
  if(wasActive) drawNoteSeq();
}
function dragCleanup(){
  clearTimeout(atDrag.timer); atDrag.timer = null;
  atDrag.armed = false;
  if(atDrag.active){ setTimeout(()=>{ atDrag.swallow = false; }, 350); }
  atDrag.active = false; atDrag.overIdx = -1;
  if(atDrag.ghost){ atDrag.ghost.remove(); atDrag.ghost = null; }
  document.removeEventListener("pointermove", dragMove);
  document.removeEventListener("pointerup", dragEnd);
  document.removeEventListener("pointercancel", dragCancel);
  document.removeEventListener("touchmove", _blockScroll);
  document.querySelectorAll("#noteSeq .note-pill").forEach(p=>p.classList.remove("dragging","ins-before","ins-after"));
  const box = document.getElementById("noteSeq"); if(box) box.classList.remove("drop-end");
}
/* 节奏拨弦位(×)总数 */
function slotCount(){
  let n = 0;
  (S.bars||[]).forEach(bar=>(bar||[]).forEach(beat=>(beat.cells||[]).forEach(c=>{ if(c===1) n++; })));
  return n;
}
function updateAtLink(){
  const el = document.getElementById("atLink"); if(!el) return;
  const slots = slotCount(), notes = atNotes.length;
  let msg = "节奏 " + slots + " 拨弦位 · 已点 " + notes + " 音";
  let warn = false;
  if(slots > 0 && notes < slots){ msg += " · 差 " + (slots-notes) + " 个,缺的位置会休止"; warn = true; }
  else if(notes > slots && slots >= 0){ msg += " · 多 " + (notes-slots) + " 个,超出的音暂不发声"; warn = (slots>0); }
  el.textContent = msg;
  el.classList.toggle("warn", warn);
}

/* -------- alphaTex 生成:节奏(时值/休止/延音)× 音序(音高)联动 -------- */
function buildTex(){
  const tempo = (typeof S!=="undefined" && S.bpm!==null) ? S.bpm : 80;
  let ptr = 0, held = null, out = [], curDur = null;
  (S.bars||[]).forEach((bar, bi)=>{
    if(bi>0) out.push("|");
    (bar||[]).forEach(beat=>{
      const sub = (beat.cells||[]).length || 1;
      const info = DUR_FOR_SUB[sub] || { v:8 };
      const tu = info.tu ? "{tu " + info.tu + "}" : "";
      (beat.cells||[]).forEach(c=>{
        let seg = "";
        if(curDur !== info.v){ seg += ":" + info.v + " "; curDur = info.v; }
        if(c === 1){                       /* 拨弦:取下一个音 */
          const p = atNotes[ptr++];
          if(p){ held = { s:p.s, f:p.f }; seg += p.f + "." + p.s + tu; }
          else { held = null; seg += "r" + tu; }
        } else if(c === 2){                 /* 延音:连结到上一音 */
          if(held) seg += "-." + held.s + tu;
          else seg += "r" + tu;
        } else {                            /* 休止 */
          held = null; seg += "r" + tu;
        }
        out.push(seg.trim());
      });
    });
  });
  if(!out.length) return "\\tempo " + tempo + " .\nr";
  return "\\tempo " + tempo + " .\n" + out.join(" ");
}
/* midi → 指板位置(优先低把位),用于骨架音名落到 tab 谱 */
function midiToPos(midi){
  let best = null;
  for(let s=1; s<=6; s++){
    const f = midi - AT_TUNING[s-1];
    if(f>=0 && f<=AT_FRETS){
      if(!best || f < best.f) best = { s, f };
    }
  }
  return best || { s:1, f:0 };
}

/* -------- alphaTab 引擎 -------- */
function at3Status(msg, cls){
  const el = document.getElementById("atStatus");
  if(el){ el.textContent = msg; el.className = "atstatus" + (cls ? " " + cls : ""); }
}
function at3Colors(){
  const cs = getComputedStyle(document.documentElement);
  const pick = (v, d)=>{ const x = cs.getPropertyValue(v).trim(); return x || d; };
  const ink = pick("--ink", "#191919");
  const muted = pick("--muted", "#6B6B68");
  return {
    mainGlyphColor: ink, secondaryGlyphColor: muted, scoreInfoColor: ink,
    barNumberColor: muted, staffLineColor: muted, barSeparatorColor: muted
  };
}
function at3LoadScript(){
  return new Promise((res, rej)=>{
    if(window.alphaTab){ res(); return; }
    const s = document.createElement("script");
    s.src = "alphatab/alphaTab.min.js";
    s.onload = ()=>res();
    s.onerror = ()=>rej(new Error("script load failed"));
    document.head.appendChild(s);
  });
}
function at3Init(){
  const el = document.getElementById("atMain");
  el.innerHTML = "";
  at3.api = new alphaTab.AlphaTabApi(el, {
    core: { fontDirectory: "alphatab/font/", logLevel: "warning" },
    display: { staveProfile: "tab", layoutMode: "horizontal", resources: at3Colors() },
    player: {
      enablePlayer: true,
      soundFont: "alphatab/soundfont/sonivox.sf3",
      enableCursor: true,
      scrollElement: "#atWrap"
    }
  });
  at3.sfOk = false; at3.rendered = false; at3.playing = false;
  at3.api.playerReady.on(()=>{
    at3.sfOk = true;
    at3ApplyPlayback();
    if(!at3.playing && !at3.fb) at3Status("引擎就绪 · 吉他音色已加载", "ok");
  });
  at3.api.error.on(e=>{
    const m = (e && e.message) ? e.message : String(e);
    at3Status("引擎报错:" + m, "err");
  });
  at3.api.renderFinished.on(()=>{
    at3.rendered = true;
    document.getElementById("atWrap").hidden = false;
    at3ApplyPlayback();
    if(!at3.sfOk) at3Status("谱面已渲染 · 音色库加载中…(未就绪时播放会先用合成音色)");
  });
  at3.api.playerStateChanged.on(e=>{
    at3.playing = (e && e.state === 1);
    at3PlayUI();
  });
}
function at3ApplyPlayback(){
  if(!at3.api) return;
  try{ at3.api.playbackSpeed = at3.speed / 100; }catch(e){}
  try{ at3.api.isLooping = at3.loop; }catch(e){}
  try{ at3.api.metronomeVolume = at3.met ? 1 : 0; }catch(e){}
  try{ at3.api.countInVolume = at3.met ? 1 : 0; }catch(e){}   /* 节拍器开时,播放前预备一小节 */
}
function at3ToggleMet(){
  at3.met = !at3.met;
  const b = document.getElementById("atMetBtn");
  if(b) b.classList.toggle("on", at3.met);
  ensureCtx();
  if(at3.api) at3ApplyPlayback();
}
async function at3Render(){
  try{
    if(!window.alphaTab){
      at3Status("正在加载谱面引擎…(约 1 MB,只需一次)");
      await at3LoadScript();
    }
    if(!at3.api) at3Init();
    at3Status("渲染中…");
    document.getElementById("atWrap").hidden = false;
    at3.api.tex(buildTex());
  }catch(err){
    at3Status("引擎加载失败 · 请确认仓库根目录有 alphatab/ 文件夹", "err");
  }
}
function at3Play(){
  if(at3.playing){ try{ at3.api.stop(); }catch(e){} at3PlayUI(); return; }
  if(at3.fb){ at3FbStop(); return; }
  if(!at3.api || !at3.rendered){ toast("先点「渲染谱面」"); at3Render(); return; }
  stopPlay();                      /* 停掉节奏循环,互斥 */
  if(at3.sfOk){
    at3ApplyPlayback();
    try{ at3.api.play(); }
    catch(e){ at3Fb(); }
  }else{
    at3Status("音色库未就绪 · 本次先用合成音色试奏");
    at3Fb();
  }
}
function at3Stop(){
  if(at3.api && at3.playing){ try{ at3.api.stop(); }catch(e){} at3.playing = false; }
  at3FbStop();
}
/* 重做:只清掉已渲染的谱面,已点音序原样保留(要清音序用「清空」按钮) */
function at3Reset(){
  at3Stop();
  if(at3.api){ try{ at3.api.destroy(); }catch(e){} }
  at3.api = null; at3.rendered = false; at3.sfOk = false;
  const wrap = document.getElementById("atWrap");
  if(wrap){ wrap.hidden = true; const mn=document.getElementById("atMain"); if(mn) mn.innerHTML=""; }
  at3Status("已清除渲染 · 音序保留,改完再点「渲染谱面」");
  toast("已清除谱面渲染(音序保留)");
}
function at3PlayUI(){
  const b = document.getElementById("atPlayBtn");
  if(!b) return;
  const on = at3.playing || !!at3.fb;
  b.querySelector(".ic").textContent = on ? "■" : "▶";
  b.querySelector("span:last-child").textContent = on ? "停止" : "播放";
  b.classList.toggle("on", on);
}
function at3Retheme(){
  if(!at3.api) return;
  at3Stop();
  const wasRendered = at3.rendered;
  try{ at3.api.destroy(); }catch(e){}
  at3.api = null; at3.rendered = false; at3.sfOk = false;
  if(wasRendered){ at3Init(); try{ at3.api.tex(buildTex()); }catch(e){} }
}
function at3SetSpeed(p){
  at3.speed = p; drawAtSpeed();
  if(at3.api) at3ApplyPlayback();
  if(at3.fb){ at3FbStop(); at3Fb(); }   /* 合成音色变速:重排当前循环 */
}
function at3ToggleLoop(){
  at3.loop = !at3.loop;
  const b = document.getElementById("atLoopBtn");
  if(b) b.classList.toggle("on", at3.loop);
  if(at3.api) at3ApplyPlayback();
}
function drawAtSpeed(){
  const box = document.getElementById("atSpeedBox"); if(!box) return;
  box.textContent = at3.speed + "%";
}
function openAtSpeedPicker(){
  openWheel("慢练速度", SPEEDS.map(p=>({value:p,label:p+"%"})), at3.speed, p=>at3SetSpeed(p));
}

/* -------- 降级:合成拨弦音按 score 调度 -------- */
function at3FbStop(){
  if(at3.fbTimer){ clearTimeout(at3.fbTimer); at3.fbTimer = null; }
  if(at3.fb){ try{ at3.fb.disconnect(); }catch(e){} at3.fb = null; }
  at3PlayUI();
}
function pluckNote(dest, time, freq, dur){
  const ctx = audioCtx, g = ctx.createGain();
  const rel = Math.min(Math.max(dur, 0.25), 1.4);
  g.gain.setValueAtTime(0.0001, time);
  g.gain.exponentialRampToValueAtTime(0.4, time + 0.006);
  g.gain.exponentialRampToValueAtTime(0.0001, time + rel);
  g.connect(dest);
  const lp = ctx.createBiquadFilter();
  lp.type = "lowpass";
  lp.frequency.setValueAtTime(Math.min(freq * 6, 4200), time);
  lp.frequency.exponentialRampToValueAtTime(Math.max(freq * 1.6, 400), time + rel * 0.8);
  lp.connect(g);
  const o1 = ctx.createOscillator(); o1.type = "sawtooth"; o1.frequency.value = freq;
  const o2 = ctx.createOscillator(); o2.type = "triangle"; o2.frequency.value = freq * 2.003;
  const g2 = ctx.createGain(); g2.gain.value = 0.35;
  o1.connect(lp); o2.connect(g2); g2.connect(lp);
  const nb = ctx.createBufferSource(); nb.buffer = pickNoise();
  const hp = ctx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 1500;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.2, time);
  ng.gain.exponentialRampToValueAtTime(0.0001, time + 0.025);
  nb.connect(hp); hp.connect(ng); ng.connect(g);
  o1.start(time); o2.start(time); nb.start(time);
  o1.stop(time + rel + 0.05); o2.stop(time + rel + 0.05); nb.stop(time + 0.05);
}
function at3Fb(){
  if(!ensureCtx()){ toast("此浏览器不支持音频播放"); return; }
  const score = at3.api && at3.api.score;
  if(!score || !score.tracks.length){ toast("没有可播放的谱面"); return; }
  const tempo = (score.tempo || 80) * at3.speed / 100;   /* 变速:折算 tempo */
  const spt = 60 / (tempo * 960);   /* 每 tick 秒数,四分音符 = 960 tick */
  const master = audioCtx.createGain();
  master.gain.value = 0.9;
  master.connect(audioCtx.destination);
  at3.fb = master;
  const t0 = audioCtx.currentTime + 0.08;
  let end = 0;
  try{
    const staff = score.tracks[0].staves[0];
    staff.bars.forEach(bar=>{
      bar.voices.forEach(v=>{
        v.beats.forEach(b=>{
          const bEnd = (b.absolutePlaybackStart + b.playbackDuration) * spt;
          end = Math.max(end, bEnd);
          if(b.isRest || !b.notes.length) return;
          const st = t0 + b.absolutePlaybackStart * spt;
          const du = b.playbackDuration * spt;
          b.notes.forEach(n=>{
            const freq = 440 * Math.pow(2, (n.realValue - 69) / 12);
            pluckNote(master, st, freq, du);
          });
        });
      });
    });
  }catch(e){
    at3FbStop();
    at3Status("合成音色播放失败:" + e.message, "err");
    return;
  }
  at3PlayUI();
  const ms = Math.ceil((end + 0.4) * 1000);
  at3.fbTimer = setTimeout(()=>{
    if(at3.loop && at3.fb){ try{ at3.fb.disconnect(); }catch(e){} at3.fb=null; at3Fb(); }
    else at3FbStop();
  }, ms);
}

/* -------- 骨架导入 / 编辑按钮 -------- */
function at3ImportSkel(){
  if(typeof S==="undefined" || !S.skel || !S.skel.length){ toast("骨架还没填音"); return; }
  const pcOf = {C:0,"C#":1,D:2,Eb:3,E:4,F:5,"F#":6,G:7,Ab:8,A:9,Bb:10,B:11};
  let ok = 0;
  S.skel.forEach(n=>{
    const pc = pcOf[n];
    if(pc===undefined || atNotes.length>=AT_MAX) return;
    const pos = midiToPos(60 + pc);      /* 骨架统一放八度 4 */
    atNotes.push({ s:pos.s, f:pos.f, as:n });
    ok++;
  });
  noteSeqChanged();
  toast("已导入 " + ok + " 个骨架音");
}
